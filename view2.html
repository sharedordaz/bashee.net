<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!--Requirement by BYU-->
    <meta name="description" content="Meta Template">
    <meta name="author" content="Name">

    <!--Facebook meta tags-->
    <meta property="og:title" content="Meta Template">
    <meta property="og:type" content="website">
    <meta property="og:image" content="image">
    <meta property="og:url" content="url">

    <link rel="icon" type="image/x-icon" href="favicon.ico">


    <link rel="stylesheet" href="styles/base-large.css">
    <link rel="stylesheet" href="styles/base-small.css">
    <link rel="stylesheet" href="styles/appointment.css">
    <link rel="stylesheet" href="styles/normalize.css">
    <title>Template Website</title>
</head>
<body>


    <header>


    </header>
    <div id="headerSpace">

    </div>

    <main>
        <form action="thankyou.html" method="GET" class="psyform">
            <h2>Appointment Form</h2>
        
            <label for="firstName">Name</label>
            <input type="text" id="firstName" name="firstName" required />

            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" required />

            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}" placeholder="1234567890" />

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />

            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="1" required />

            <label>Gender</label>
            <div class="gender-group">
                <div class="gender-option">
                    <input type="radio" id="female" name="gender" value="female" required />
                    <label for="female" class="gender-symbol">Female</label>
                </div>
                <div class="gender-option">
                    <input type="radio" id="male" name="gender" value="male" />
                    <label for="male" class="gender-symbol">Male</label>
                </div>
                <div class="gender-option">
                    <input type="radio" id="nonbinary" name="gender" value="nonbinary" />
                    <label for="nonbinary" class="gender-symbol">Other</label>
                </div>
            </div>

            <label for="about">About You</label>
            <textarea id="about" name="about" placeholder="Lorem ipsum dolor sit amet..." required></textarea>

            <button type="submit">Submit</button>
        </form>

    </main>

    <footer>

        
    </footer>
    <script src="scripts/menu.js" defer></script>
    <script src="scripts/appointment.js" defer></script>
    <script src="scripts/footer.js" defer></script>
    <script src="scripts/header.js" defer></script>
</body>
</html>
